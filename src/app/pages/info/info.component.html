<form [formGroup]="consentForm">
  <div class="info-container">
    <h3>Notes and Reminders</h3>
    <div [innerHTML]="reminders" class="reminders"></div>
    <div class="checkbox-group">

      <label class="checkbox-row">
        <input type="checkbox" formControlName="privacyNotice">

        <span>
          I have read and understood the
          <a href="#">Data Privacy Notice</a>
        </span>

      </label>

      <label class="checkbox-row">

        <input type="checkbox" formControlName="consent">

        <span>
          I give my consent to the collection and processing of my personal data
          by the Legislative Information Resources Management Department (LIRMD)
          of the House of Representatives in accordance with the Data Privacy
          Act of 2012 RA 10173 and its implementing Rules and Regulations IRR.
        </span>

      </label>
    </div>

    <div class="error" *ngIf="submitted && consentForm.invalid">
      Please read the privacy notice and provide your consent before proceeding.
    </div>

    <button type="button" class="next-btn" (click)="proceed()">
      Next
    </button>
  </div>
</form>
