<div class="container">
  <div class="left">
    <div class="logo">
      <a routerLink="/">
        <img src="../../../assets/images/the-house-logo-white.png" alt="" />
      </a>
    </div>
    <form [formGroup]="consentForm">
      <div class="info-container">
        <h3>Notes and Reminders</h3>
        <div [innerHTML]="reminders" class="reminders"></div>
        <div class="checkbox-group">

          <label class="checkbox-row">
            <input type="checkbox" formControlName="privacyNotice">
            <span>
              I have read and understood the
              <a href="#">Data Privacy Notice</a>
            </span>

          </label>

          <label class="checkbox-row">

            <input type="checkbox" formControlName="consent">

            <span>
              I give my consent to the collection and processing of my personal data
              by the Legislative Information Resources Management Department (LIRMD)
              of the House of Representatives in accordance with the Data Privacy
              Act of 2012 or R.A. No. 10173 and its implementing Rules and Regulation.
            </span>

          </label>
        </div>

        <div class="error" *ngIf="submitted && consentForm.invalid">
          Please read the privacy notice and provide your consent before proceeding.
        </div>

        <button type="button" class="next-btn" (click)="proceed()">
          Next
        </button>
      </div>
    </form>

    <div class="footer">
        <span class="x">
          <i class="fa-brands fa-x-twitter"></i>
          &#64;thehouse.museum
        </span>
        <span class="email">
          <i class="fa-solid fa-envelope"></i>
          legislative&#64;thehouse.gov.ph
        </span>
        <span class="phone">
          <i class="fa-solid fa-phone"></i>
          8931-5001 Loc 7650 / 7685
        </span>
        <span class="tiktok">
          <i class="fa-brands fa-tiktok"></i>
          &#64;thehousemuseum
        </span>
    </div>
  </div>
  <div class="right">
    <div class="footer">
        <img src="../assets/images/logo-header-1.svg" alt="Logo 1" class="logo-1">
        <img src="../assets/images/the-house-logo-blue.svg" alt="Logo 2">
    </div>
  </div>
</div>
