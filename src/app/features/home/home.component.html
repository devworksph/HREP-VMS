<main>
  <ngx-form-wizard
    [steps]="steps"
    [stepperOptions]="stepperOptions"
    (finished)="onFinish()"
    (cancelled)="onCancel()">
  </ngx-form-wizard>
  <p-dialog
    header="Success"
    [(visible)]="displaySuccessDialog"
    [modal]="true"
    [closable]="false"
    [responsive]="true"
    [style]="{ width: '450px' }"
  >
    <p>Booking was sent successfully!</p>
    <p-button label="Ok" (click)="closeSuccessDialog()"/>
    <p-footer>
      <button type="button" label="OK" icon="pi pi-check" (click)="closeSuccessDialog()"></button>
    </p-footer>
  </p-dialog>
</main>
